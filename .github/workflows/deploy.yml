name: CI/CD Pipeline Java 21

on:
  push:
    branches: [ "main" ] # Robot tự chạy khi bạn push code lên main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Thay đổi tên image tùy ý bạn
          tags: ${{ secrets.DOCKER_USERNAME }}/demo-cicd-hutech:latest
