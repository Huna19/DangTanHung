name: CI to Docker Hub

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Lấy code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build + Push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./DEMOCICD
          file: ./DEMOCICD/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/spring-boot-app:latest
            ${{ secrets.DOCKER_USERNAME }}/spring-boot-app:${{ github.sha }}

      # 4. Deploy (ĐÃ FIX lỗi 404 + sai repo)
      - name: Deploy to DevOps Classroom
        run: |
          REPO="${{ secrets.DOCKER_USERNAME }}/spring-boot-app"

          echo "Deploying: $REPO"

          curl -X POST "${{ secrets.DEPLOY_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"repo\": \"$REPO\",
              \"tag\": \"latest\",
              \"slot\": 2,
              \"container_port\": 8080
            }"
